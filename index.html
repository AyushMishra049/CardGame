    <div class="b1">
        <button onclick="shuffleCards()" class="shuffle-btn">
            Shuffle Cards
        </button>
    </div>
    <script>
    const boxes = document.querySelectorAll(".name");
    const container = document.querySelector(".main");

    let draggedBox = null;

    // -------------------- Shuffle Cards --------------------
    function shuffleCards() {
        const cards = Array.from(container.children);

        for (let i = cards.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [cards[i], cards[j]] = [cards[j], cards[i]];
        }

        cards.forEach(card => container.appendChild(card));
    }

    // Shuffle automatically when page loads
    shuffleCards();

    // -------------------- Drag & Drop --------------------
    boxes.forEach(box => {

        box.addEventListener("dragstart", () => {
            draggedBox = box;
            box.classList.add("dragging");
            setTimeout(() => {
                box.style.opacity = "0.5";
            }, 0);
        });

        box.addEventListener("dragend", () => {
            box.classList.remove("dragging");
            box.style.opacity = "1";
        });

    });

    container.addEventListener("dragover", (e) => {
        e.preventDefault();

        const afterElement = getDragAfterElement(container, e.clientX, e.clientY);

        if (afterElement == null) {
            container.appendChild(draggedBox);
        } else {
            container.insertBefore(draggedBox, afterElement);
        }
    });

    function getDragAfterElement(container, x, y) {

        const elements = [...container.querySelectorAll(".name:not(.dragging)")];

        return elements.reduce((closest, child) => {

            const box = child.getBoundingClientRect();

            const offset = y - box.top - box.height / 2;

            if (offset < 0 && offset > closest.offset) {
                return { offset: offset, element: child };
            } else {
                return closest;
            }

        }, { offset: Number.NEGATIVE_INFINITY }).element;
    }
    </script>
